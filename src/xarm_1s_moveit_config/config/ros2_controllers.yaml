controller_manager:
  ros__parameters:
    update_rate: 100

    # 팔 컨트롤러 상세 설정
    xarm_1s_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # 그리퍼 컨트롤러 상세 설정
    hand_controller:
      type: position_controllers/GripperActionController

    # joint_states 토픽 뿌려주기
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

xarm_1s_arm_controller:
  ros__parameters:
    joints:
      - arm6
      - arm5
      - arm4
      - arm3
      - arm2

    # position 명령을 보내기
    command_interfaces:
      - position

    # position 명령을 받기
    state_interfaces:
      - position

    # 오픈 루프: 하드웨어 피드백 검증 없이 궤적 실행 (시간 파라미터화 오류 우회)
    open_loop_control: true

    allow_integration_in_goal_trajectories: true
    allow_nonzero_velocity_at_trajectory_end: true

hand_controller:
  ros__parameters:
    joint: arm1
    action_monitor_rate: 20.0
    goal_tolerance: 0.05      # 허용 오차 넓힘 (서보 위치 피드백 부정확성 대비)
    max_effort: 100.0
    allow_stalling: true      # hw interface가 velocity=0 반환하므로 stall 허용
    stall_velocity_threshold: 0.001
    stall_timeout: 0.5        # 실행 timeout(~1.8s)보다 짧게 설정
